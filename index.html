<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSS Scanner (Google Forms)</title>
    <style>
        :root { --primary: #28a745; --danger: #dc3545; --bg: #f4f6f9; --card-bg: #ffffff; }
        body { background: var(--bg); font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 500px; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        
        /* Main UI */
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 1.5rem; }
        
        #scanner-container { background: black; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; height: 300px; }
        #scanner-container.active { display: block; }

        input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        button { border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-stop { background: var(--danger); color: white; display: none; }
        
        .entry-row { display: flex; gap: 10px; }
        .entry-row input:first-child { flex: 2; } 
        .entry-row input:last-child { flex: 1; }  

        .status { text-align: center; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary);">NSS Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">Login</button>
            <p id="login-msg" style="color: red; font-size: 0.9rem;"></p>
        </div>
    </div>

    <div class="container" id="main-app" style="display:none;">
        <div class="header">
            <h1>NSS Attendance</h1>
            <p style="color: #666; font-size: 0.9rem;">Linked to Google Form</p>
        </div>

        <div class="card">
            <div id="statusBox" class="status"></div>

            <div id="scanner-container"><div id="reader"></div></div>
            <button id="scanBtn" class="btn-primary" onclick="startScanner()">Start Camera</button>
            <button id="stopBtn" class="btn-stop" onclick="stopScanner()">Stop Camera</button>

            <label style="font-size: 0.85rem; color: #666; font-weight: bold;">Manual Entry</label>
            <div class="entry-row">
                <input type="text" id="rollInput" placeholder="Roll Number (e.g. CB.EN...)" style="text-transform: uppercase;">
                <input type="number" id="hoursInput" placeholder="Hrs" value="4">
            </div>
            <button class="btn-primary" id="submitBtn" onclick="submitAttendance()">Mark Attendance</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        // ================= CONFIGURATION =================
        // 1. Replace with your FORM ID (The long string in your URL)
        const FORM_ID = "1FAIpQLSdLrpf4SW5N0BIsgeLPjDktOitrzVTr95Bke8Na6nJFqhuLew"; 
        
        // 2. Replace with your ENTRY IDs (Found in the pre-filled link)
        const ENTRY_ROLL = "entry.865610097"; 
        const ENTRY_HOURS = "entry.1967549700"; 

        // 3. Set your simple password here
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "nss2024";
        // =================================================

        const FORM_URL = `https://docs.google.com/forms/d/e//formResponse`;
        const loginOverlay = document.getElementById('login-overlay');
        const mainApp = document.getElementById('main-app');
        const statusBox = document.getElementById('statusBox');
        let html5QrCode = null;

        // --- AUTHENTICATION ---
        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msg = document.getElementById('login-msg');

            if (u === ADMIN_USER && p === ADMIN_PASS) {
                loginOverlay.style.display = 'none';
                mainApp.style.display = 'block';
            } else {
                msg.textContent = "Invalid Credentials";
            }
        }

        // --- SUBMIT DATA TO GOOGLE FORM ---
        async function submitAttendance(roll = null) {
            const rollVal = roll || document.getElementById('rollInput').value.trim().toUpperCase();
            const hoursVal = document.getElementById('hoursInput').value;
            const btn = document.getElementById('submitBtn');

            if (!rollVal) return showStatus("Enter Roll Number", "error");

            showStatus("Submitting...", "success");
            btn.classList.add('loading');
            
            // Build the form data
            const formData = new FormData();
            formData.append(ENTRY_ROLL, rollVal);
            formData.append(ENTRY_HOURS, hoursVal);

            try {
                // IMPORTANT: mode: 'no-cors' tells the browser "Don't expect a response".
                // Google Forms doesn't send a standard success message to external sites.
                // We assume success if the network request doesn't fail.
                await fetch(FORM_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: formData
                });

                showStatus(`✅ Marked: ${rollVal} (${hoursVal} hrs)`, "success");
                document.getElementById('rollInput').value = "";
                
            } catch (err) {
                showStatus("❌ Submission Failed. Check Internet.", "error");
                console.error(err);
            } finally {
                btn.classList.remove('loading');
            }
        }

        function showStatus(msg, type) {
            statusBox.textContent = msg;
            statusBox.className = `status ${type}`;
            statusBox.style.display = 'block';
            
            // Auto hide success messages after 3 seconds
            if(type === 'success') {
                setTimeout(() => {
                    statusBox.style.display = 'none';
                }, 3000);
            }
        }

        // --- SCANNER LOGIC ---
        function startScanner() {
            document.getElementById('scanner-container').classList.add('active');
            document.getElementById('scanBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    // Success callback
                    document.getElementById('rollInput').value = decodedText;
                    submitAttendance(decodedText);
                    // Pause briefly to avoid double scans
                    html5QrCode.pause();
                    setTimeout(() => html5QrCode.resume(), 2500);
                },
                (errorMessage) => {}
            );
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').classList.remove('active');
                    document.getElementById('scanBtn').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    html5QrCode.clear();
                });
            }
        }
    </script>
</body>
</html>
