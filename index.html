<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSS NFC Attendance</title>
    <style>
        :root {
            --primary: #667eea;
            --bg: #000000;          /* Black Background */
            --card-bg: #1a1a1a;     /* Dark Card */
            --text: #ffffff;        /* White Text */
            --text-secondary: #a0aec0;
            --border: #333333;
            --input-bg: #2d2d2d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 1.8rem; color: var(--primary); letter-spacing: -0.5px; margin-bottom: 5px;}
        .header p { color: var(--text-secondary); font-size: 0.9rem; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        /* Input Styling */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1.1rem;
            transition: all 0.2s;
            background: var(--input-bg);
            color: white;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input:focus { outline: none; border-color: var(--primary); background: #333; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-bottom: 15px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #5a67d8; }
        
        .btn-outline { 
            background: transparent; 
            border: 2px solid var(--border); 
            color: var(--text-secondary); 
            margin-bottom: 20px;
        }
        .btn-outline:hover { border-color: var(--text-secondary); color: white; border-color: white;}
        
        /* Animation */
        .pulse {
            animation: pulse-animation 2s infinite;
            border-color: var(--primary);
            color: var(--primary);
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        /* Table Styling */
        .table-container {
            margin-top: 25px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .table-header-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            text-align: left;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 0;
            border-bottom: 1px solid #333;
            color: var(--text);
        }
        .roll-col {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--primary);
        }
        .time-col {
            text-align: right;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            font-weight: 600;
        }
        .alert.success { background: #2f855a; color: white; }
        .alert.error { background: #c53030; color: white; }
        .alert.warning { background: #b7791f; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>NSS Attendance</h1>
            <p>Tap Card (NFC) or Type Roll Number</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <button id="nfcBtn" class="btn btn-outline">📡 Start NFC Scanner</button>
            <p id="nfcStatus" style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 15px; display: none;">Approach ID Card to back of phone...</p>

            <div class="input-group">
                <label>Roll Number / Card ID</label>
                <input type="text" id="rollInput" placeholder="Waiting for card..." autocomplete="off">
            </div>

            <button id="saveBtn" class="btn btn-primary">Save Entry</button>
            <button id="exportBtn" class="btn btn-primary" style="background-color: #2d3748;">Export CSV</button>

            <div class="table-container">
                <span class="table-header-label">Scanned List (<span id="count">0</span>)</span>
                <table>
                    <thead>
                        <tr>
                            <th>ID / Roll No</th>
                            <th style="text-align: right;">Time</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- Variables ---
        const STORAGE_KEY = 'nss_attendance_nfc';
        const rollInput = document.getElementById('rollInput');
        const saveBtn = document.getElementById('saveBtn');
        const exportBtn = document.getElementById('exportBtn');
        const nfcBtn = document.getElementById('nfcBtn');
        const nfcStatus = document.getElementById('nfcStatus');
        const alertBox = document.getElementById('alertBox');
        const tableBody = document.getElementById('attendanceTableBody');
        const countLabel = document.getElementById('count');

        let ndef = null; // NFC Reader Object
        let todayAttendance = new Set();

        // --- Helper: Update Table ---
        function addRowToTable(roll, timestamp) {
            const row = document.createElement('tr');
            const timeStr = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            row.innerHTML = `
                <td class="roll-col">${roll}</td>
                <td class="time-col">${timeStr}</td>
            `;
            
            tableBody.insertBefore(row, tableBody.firstChild);
            countLabel.textContent = todayAttendance.size;
        }

        function notify(msg, type = 'success') {
            alertBox.textContent = msg;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
        }

        // --- NFC Logic (Web NFC API) ---
        nfcBtn.addEventListener("click", async () => {
            // Check if browser supports Web NFC
            if (!("NDEFReader" in window)) {
                notify("NFC not supported on this device/browser. (Use Android Chrome)", "error");
                return;
            }

            try {
                ndef = new NDEFReader();
                await ndef.scan();
                
                // UI Updates
                nfcBtn.innerText = "Listening for Cards...";
                nfcBtn.classList.add("pulse");
                nfcStatus.style.display = "block";
                notify("NFC Active! Tap card to phone.", "success");

                ndef.onreadingerror = () => {
                    notify("Read error! Try tapping again.", "error");
                };

                ndef.onreading = event => {
                    // 1. Try to get Serial Number (UID)
                    const serialNumber = event.serialNumber;
                    
                    if (serialNumber) {
                        // Format serial number (e.g., 04:3a:22)
                        const formattedID = serialNumber.toUpperCase();
                        handleRollNumber(formattedID, true);
                    } else {
                        // If no serial, try to read text records
                        // (Usually student IDs use the serial number, but just in case)
                        notify("Card detected but no ID found.", "warning");
                    }
                };

            } catch (error) {
                notify("Error starting NFC: " + error, "error");
            }
        });

        // --- Core Data Logic ---
        function getStoredData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function handleRollNumber(text, isScanned = false) {
            const cleanText = text.trim().toUpperCase(); // Allow colons for RFID format
            
            if (!cleanText) {
                if(!isScanned) notify("Enter a Value", "error"); 
                return; 
            }

            if (!isScanned) rollInput.value = cleanText;

            if (todayAttendance.has(cleanText)) {
                notify("⚠️ " + cleanText + " already marked!", "warning");
                if(!isScanned) rollInput.value = '';
                return;
            }

            const timestamp = Date.now();
            const record = { 
                roll: cleanText, 
                date: new Date().toISOString().split('T')[0], 
                timestamp: timestamp 
            };
            
            const data = getStoredData();
            data.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            todayAttendance.add(cleanText);
            addRowToTable(cleanText, timestamp);
            notify("✅ Added: " + cleanText, "success");
            
            if (!isScanned) {
                rollInput.value = '';
                rollInput.focus();
            } else {
                rollInput.value = cleanText;
            }
        }

        // --- Event Listeners ---
        saveBtn.addEventListener('click', () => handleRollNumber(rollInput.value));
        
        rollInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleRollNumber(rollInput.value);
        });

        exportBtn.addEventListener('click', () => {
            const data = getStoredData();
            if (data.length === 0) {
                notify("No data to export", "warning");
                return;
            }
            const csvContent = "ID/Roll,Date,Time\n" + 
                data.map(r => `${r.roll},${r.date},${new Date(r.timestamp).toLocaleTimeString()}`).join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nss_nfc_attendance_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // USB RFID Reader Listener (Keyboard Emulation)
        // Many USB readers act as keyboards. This captures that input.
        let kbBuffer = '';
        let kbTimer;
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'Enter') {
                if (kbBuffer.length > 2) handleRollNumber(kbBuffer, true);
                kbBuffer = '';
            } else {
                // Filter out non-character keys if necessary
                if(e.key.length === 1) kbBuffer += e.key;
                clearTimeout(kbTimer);
                kbTimer = setTimeout(() => kbBuffer = '', 200); // 200ms timeout for rapid input
            }
        });

        // --- Initialize ---
        function loadTodayData() {
            const today = new Date().toISOString().split('T')[0];
            const data = getStoredData();
            todayAttendance.clear();
            tableBody.innerHTML = ''; 

            const todaysRecords = data.filter(record => record.date === today);
            
            todaysRecords.forEach(record => {
                todayAttendance.add(record.roll);
                addRowToTable(record.roll, record.timestamp);
            });
            countLabel.textContent = todayAttendance.size;
        }

        loadTodayData();
        
        // Initial check
        if (!("NDEFReader" in window)) {
            // Don't show error immediately, but update button style to indicate it might be manual only
            nfcBtn.innerText = "NFC Not Supported (Use Manual/USB)";
            nfcBtn.style.opacity = "0.5";
        }
    </script>
</body>
</html>
