<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSS Attendance</title>
    <style>
        :root {
            --primary: #667eea;
            --bg: #f4f6f8;
            --text: #2d3748;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Minimal Input Styling */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #718096; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: border 0.2s;
            background: #fcfcfc;
        }
        input[type="text"] {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input:focus { outline: none; border-color: var(--primary); background: white; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #718096; }
        .btn-outline:hover { border-color: #cbd5e0; color: #4a5568; }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        .alert.success { background: #c6f6d5; color: #22543d; display: block; }
        .alert.error { background: #fed7d7; color: #822727; display: block; }
        .alert.warning { background: #feebc8; color: #744210; display: block; }

        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>NSS Attendance</h1>
            <p style="font-size: 0.9rem; color: #718096; margin-top: 5px;">Manual Entry System</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <div class="input-group">
                <label>Student Roll Number</label>
                <input type="text" id="rollInput" placeholder="Type roll number here..." autocomplete="off">
                <small style="color: #718096; font-size: 0.8rem; margin-top: 5px; display: block;">Type roll number manually or use connected barcode scanner</small>
            </div>

            <button id="saveBtn" class="btn btn-primary" style="margin-bottom: 15px;">Save Roll Number</button>
            <button id="exportBtn" class="btn btn-primary">Export CSV</button>
        </div>
    </div>


    <script>
        // Local storage key
        const STORAGE_KEY = 'nss_attendance';

        // Elements
        const rollInput = document.getElementById('rollInput');
        const saveBtn = document.getElementById('saveBtn');
        const exportBtn = document.getElementById('exportBtn');
        const alertBox = document.getElementById('alertBox');

        let todayAttendance = new Set();

        // Local storage functions
        function getStoredData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveToStorage(record) {
            const data = getStoredData();
            data.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Helper: Alerts
        function notify(msg, type = 'success') {
            alertBox.textContent = msg;
            alertBox.className = `alert ${type}`;
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
        }

        // 1. Input Handling
        function handleRollNumber(text) {
            const cleanText = text.trim().toUpperCase().replace(/[^A-Z0-9.]/g, '');
            
            // Auto-check for duplicates
            if (todayAttendance.has(cleanText)) {
                notify("⚠️ Already marked today!", "warning");
                return;
            }

            // Auto-save locally
            const roll = cleanText;
            const date = new Date().toISOString().split('T')[0];
            const timestamp = Date.now();

            if (!roll) { 
                notify("Enter a roll number", "error"); 
                return; 
            }

            const record = { roll, date, timestamp };
            saveToStorage(record);
            todayAttendance.add(roll);

            notify("✅ Saved: " + roll, "success");
        }

        // Auto-save on enter
        rollInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const roll = rollInput.value.trim().toUpperCase();
                const date = new Date().toISOString().split('T')[0];
                const timestamp = Date.now();

                if (!roll) { notify("Enter a roll number", "error"); return; }

                // Check duplicate
                if (todayAttendance.has(roll)) {
                    notify("⚠️ Already marked today!", "warning");
                    return;
                }

                const record = { roll, date, timestamp };
                saveToStorage(record);
                todayAttendance.add(roll);

                notify("✅ Saved: " + roll, "success");
                rollInput.value = ''; // Clear input
                rollInput.focus();
            }
        });

        // Manual save button
        saveBtn.addEventListener('click', () => {
            const roll = rollInput.value.trim().toUpperCase();
            const date = new Date().toISOString().split('T')[0];
            const timestamp = Date.now();

            if (!roll) { notify("Enter a roll number", "error"); return; }

            // Check duplicate
            if (todayAttendance.has(roll)) {
                notify("⚠️ Already marked today!", "warning");
                return;
            }

            const record = { roll, date, timestamp };
            saveToStorage(record);
            todayAttendance.add(roll);

            notify("✅ Saved: " + roll, "success");
            rollInput.value = ''; // Clear input
            rollInput.focus();
        });

        // Export CSV
        exportBtn.addEventListener('click', () => {
            const data = getStoredData();
            if (data.length === 0) {
                notify("No data to export", "warning");
                return;
            }

            // Create CSV content
            const csvHeader = "Roll Number,Date,Timestamp\n";
            const csvRows = data.map(record => `${record.roll},${record.date},${new Date(record.timestamp).toLocaleString()}`).join("\n");
            const csvContent = csvHeader + csvRows;

            // Download CSV
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            notify("CSV exported!", "success");
        });

        // Load today's data
        function loadTodayData() {
            const today = new Date().toISOString().split('T')[0];
            const data = getStoredData();
            todayAttendance.clear();
            data.forEach(record => {
                if (record.date === today) {
                    todayAttendance.add(record.roll);
                }
            });
        }

        // Keyboard Scanner Support (for external barcode scanners)
        let kbBuffer = '';
        let kbTimer;
        document.addEventListener('keydown', (e) => {
            // Don't capture if typing in input field
            if (e.target.tagName === 'INPUT' && e.target.id === 'rollInput') return;
            
            if (e.key === 'Enter') {
                if (kbBuffer.length > 2) { // Minimum length for roll number
                    handleRollNumber(kbBuffer);
                }
                kbBuffer = '';
            } else if (e.key.length === 1) { // Only add printable characters
                kbBuffer += e.key;
                clearTimeout(kbTimer);
                kbTimer = setTimeout(() => kbBuffer = '', 200); // Clear buffer after 200ms of inactivity
            }
        });

        // Initial load and focus
        loadTodayData();
        rollInput.focus();

    </script>
</body>
</html>
