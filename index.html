<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSS Event Scanner</title>

<style>
:root {
    --primary:#667eea; --danger:#e53e3e; --bg:#000;
    --card-bg:#1a1a1a; --text:#fff; --text-secondary:#a0aec0;
    --border:#333; --input-bg:#2d2d2d;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);display:flex;justify-content:center;min-height:100vh;padding:20px}
.container{max-width:600px;width:100%}
.header{text-align:center;margin-bottom:25px}
.header h1{color:var(--primary)}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:20px}

#scanner-container{display:none;border:2px solid var(--border);border-radius:12px;margin-bottom:20px}
#scanner-container.active{display:block}
#reader{width:100%}

.btn{width:100%;padding:14px;border:none;border-radius:8px;font-weight:600;margin-bottom:12px;cursor:pointer}
.btn-outline{background:none;border:2px solid var(--border);color:var(--text-secondary)}
.btn-primary{background:var(--primary);color:#fff}
.btn-stop{background:var(--danger);display:none}
.btn-clear{border:1px solid var(--danger);background:none;color:var(--danger)}

input{width:100%;padding:14px;border-radius:8px;border:2px solid var(--border);background:var(--input-bg);color:white;font-weight:bold}

table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border-bottom:1px solid #333;padding:10px}
.roll-col{color:var(--primary);font-weight:bold}
.time-col{text-align:right;color:var(--text-secondary)}
small{color:var(--text-secondary)}

.alert{display:none;padding:12px;border-radius:8px;margin-bottom:15px;text-align:center;font-weight:bold}
.alert.success{background:#2f855a}
.alert.warning{background:#b7791f}
.alert.error{background:#c53030}
</style>
</head>

<body>
<div class="container">
<div class="header">
<h1>NSS Event Scanner</h1>
<p>QR + Name Verification</p>
</div>

<div class="card">
<div id="alertBox" class="alert"></div>

<div id="scanner-container">
<div id="reader"></div>
</div>

<button id="scanBtn" class="btn btn-outline">Scan</button>
<button id="stopBtn" class="btn btn-stop">Stop</button>

<input id="rollInput" placeholder="Scan or type…">

<button id="saveBtn" class="btn btn-primary">Save Entry</button>
<button id="exportBtn" class="btn btn-primary" style="background:#2d3748">Export CSV</button>

<table>
<thead>
<tr><th>Roll / Name</th><th class="time-col">Time</th></tr>
</thead>
<tbody id="attendanceTableBody"></tbody>
</table>

<button id="clearBtn" class="btn btn-clear">Clear All</button>
</div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const STORAGE_KEY="nss_attendance_final";
const tableBody=document.getElementById("attendanceTableBody");
const rollInput=document.getElementById("rollInput");
const alertBox=document.getElementById("alertBox");
let todayAttendance=new Set();
let html5QrCode=null,isScanning=false;

function notify(msg,type="success"){
alertBox.textContent=msg;
alertBox.className=`alert ${type}`;
alertBox.style.display="block";
setTimeout(()=>alertBox.style.display="none",3000);
}

function parseQR(text){
let roll="",name="";
if(text.includes("ROLL=")){
text.split(";").forEach(p=>{
if(p.startsWith("ROLL="))roll=p.replace("ROLL=","").trim().toUpperCase();
if(p.startsWith("NAME="))name=p.replace("NAME=","").trim();
});
}else{
roll=text.trim().toUpperCase();
}
return {roll,name};
}

function addRow(roll,name,time){
const tr=document.createElement("tr");
tr.innerHTML=`
<td class="roll-col">${roll}<br><small>${name||""}</small></td>
<td class="time-col">${time}</td>`;
tableBody.prepend(tr);
}

function getData(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}

function saveEntry(text){
const {roll,name}=parseQR(text);
if(!roll){notify("Invalid QR","error");return;}
if(todayAttendance.has(roll)){notify(`${roll} already scanned`,"warning");return;}

const now=new Date();
const record={roll,name,date:now.toISOString().split("T")[0],timestamp:now.getTime()};
const data=getData(); data.push(record);
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
todayAttendance.add(roll);
addRow(roll,name,now.toLocaleTimeString());
notify(`Saved ${roll}`);
rollInput.value="";
}

document.getElementById("saveBtn").onclick=()=>saveEntry(rollInput.value);

document.getElementById("scanBtn").onclick=async()=>{
html5QrCode=new Html5Qrcode("reader");
document.getElementById("scanner-container").classList.add("active");
document.getElementById("scanBtn").style.display="none";
document.getElementById("stopBtn").style.display="block";
await html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},
txt=>saveEntry(txt));
};

document.getElementById("stopBtn").onclick=()=>{
html5QrCode.stop(); html5QrCode.clear();
document.getElementById("scanner-container").classList.remove("active");
document.getElementById("scanBtn").style.display="block";
document.getElementById("stopBtn").style.display="none";
};

document.getElementById("exportBtn").onclick=()=>{
const data=getData();
if(!data.length){notify("No data","warning");return;}
let csv="Roll,Name,Date,Time\n"+data.map(r=>
`${r.roll},${r.name||""},${r.date},${new Date(r.timestamp).toLocaleTimeString()}`
).join("\n");
const a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
a.download="attendance.csv"; a.click();
};

document.getElementById("clearBtn").onclick=()=>{
if(confirm("Clear all data?")){
localStorage.removeItem(STORAGE_KEY);
tableBody.innerHTML=""; todayAttendance.clear();
notify("Cleared","warning");
}
};

(function load(){
const today=new Date().toISOString().split("T")[0];
getData().filter(r=>r.date===today).forEach(r=>{
todayAttendance.add(r.roll);
addRow(r.roll,r.name,new Date(r.timestamp).toLocaleTimeString());
});
})();
</script>
</body>
</html>
