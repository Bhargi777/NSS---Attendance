<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSS Attendance</title>
    <style>
        :root {
            --primary: #667eea;
            --bg: #f4f6f8;
            --text: #2d3748;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Minimal Input Styling */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #718096; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: border 0.2s;
            background: #fcfcfc;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input:focus { outline: none; border-color: var(--primary); background: white; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #718096; }
        
        /* Scanner */
        #scanner-container {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            background: #000;
        }
        #scanner-container.active { display: block; }
        #reader { width: 100%; }

        /* Table Styling */
        .table-container {
            margin-top: 20px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            text-align: left;
            color: #718096;
            font-size: 0.8rem;
            text-transform: uppercase;
            padding-bottom: 10px;
        }
        td {
            padding: 12px 0;
            border-bottom: 1px solid #f7fafc;
        }
        .roll-col {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--text);
        }
        .time-col {
            text-align: right;
            color: #718096;
            font-size: 0.85rem;
        }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        .alert.success { background: #c6f6d5; color: #22543d; }
        .alert.error { background: #fed7d7; color: #822727; }
        .alert.warning { background: #feebc8; color: #744210; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>NSS Attendance</h1>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <div id="scanner-container">
                <div id="reader"></div>
            </div>

            <button id="scanBtn" class="btn btn-outline" style="margin-bottom: 20px;">📷 Open Camera</button>
            <button id="stopScanBtn" class="btn btn-outline" style="margin-bottom: 20px; display: none;">🛑 Stop Camera</button>

            <div class="input-group">
                <label>Student Roll Number</label>
                <input type="text" id="rollInput" placeholder="Type or Scan..." autocomplete="off">
            </div>

            <button id="saveBtn" class="btn btn-primary" style="margin-bottom: 15px;">Save Roll Number</button>
            <button id="exportBtn" class="btn btn-primary">Export CSV</button>

            <div class="table-container">
                <label>Scanned List (<span id="count">0</span>)</label>
                <table>
                    <thead>
                        <tr>
                            <th>Roll Number</th>
                            <th style="text-align: right;">Time</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<body>

    <div class="container">
        <div class="header">
            <h1>NSS Attendance</h1>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <div id="scanner-container">
                <div id="reader"></div>
            </div>

            <button id="scanBtn" class="btn btn-outline" style="margin-bottom: 20px;">📷 Open Camera</button>
            <button id="stopScanBtn" class="btn btn-outline" style="margin-bottom: 20px; display: none;">🛑 Stop Camera</button>

            <div class="input-group">
                <label>Student Roll Number</label>
                <input type="text" id="rollInput" placeholder="Type or Scan..." autocomplete="off">
            </div>

            <button id="saveBtn" class="btn btn-primary" style="margin-bottom: 15px;">Save Roll Number</button>
            <button id="exportBtn" class="btn btn-primary">Export CSV</button>

            <div class="table-container">
                <label>Scanned List (<span id="count">0</span>)</label>
                <table>
                    <thead>
                        <tr>
                            <th>Roll Number</th>
                            <th style="text-align: right;">Time</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        // --- Variables ---
        const STORAGE_KEY = 'nss_attendance';
        const rollInput = document.getElementById('rollInput');
        const saveBtn = document.getElementById('saveBtn');
        const exportBtn = document.getElementById('exportBtn');
        const scanBtn = document.getElementById('scanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const alertBox = document.getElementById('alertBox');
        const scannerContainer = document.getElementById('scanner-container');
        const tableBody = document.getElementById('attendanceTableBody');
        const countLabel = document.getElementById('count');

        let html5QrCode = null;
        let todayAttendance = new Set();

        // --- Helper: Update Table ---
        function addRowToTable(roll, timestamp) {
            const row = document.createElement('tr');
            const timeStr = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            row.innerHTML = `
                <td class="roll-col">${roll}</td>
                <td class="time-col">${timeStr}</td>
            `;
            
            // Prepend to show latest on top
            tableBody.insertBefore(row, tableBody.firstChild);
            countLabel.textContent = todayAttendance.size;
        }

        function notify(msg, type = 'success') {
            alertBox.textContent = msg;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
        }

        // --- Scanner Logic ---
        scanBtn.addEventListener('click', async () => {
            if (typeof Html5Qrcode === "undefined") {
                notify("Scanner library loading...", "warning");
                return;
            }
            try {
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                scannerContainer.classList.add('active');
                scanBtn.style.display = 'none';
                stopScanBtn.style.display = 'block';
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        handleRollNumber(decodedText, true);
                    },
                    (errorMessage) => {}
                );
            } catch (err) {
                notify("Camera error: " + err, "error");
                stopScanner();
            }
        });

        stopScanBtn.addEventListener('click', stopScanner);

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    scannerContainer.classList.remove('active');
                    scanBtn.style.display = 'block';
                    stopScanBtn.style.display = 'none';
                    html5QrCode.clear();
                });
            }
        }

        // --- Core Logic ---
        function getStoredData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function handleRollNumber(text, isScanned = false) {
            const cleanText = text.trim().toUpperCase().replace(/[^A-Z0-9.]/g, '');
            
            if (!cleanText) {
                if(!isScanned) notify("Enter a roll number", "error"); 
                return; 
            }

            if (!isScanned) rollInput.value = cleanText;

            // Check Duplicate
            if (todayAttendance.has(cleanText)) {
                notify("⚠️ " + cleanText + " already marked!", "warning");
                if(!isScanned) rollInput.value = '';
                return;
            }

            // Save Data
            const timestamp = Date.now();
            const record = { 
                roll: cleanText, 
                date: new Date().toISOString().split('T')[0], 
                timestamp: timestamp 
            };
            
            const data = getStoredData();
            data.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            todayAttendance.add(cleanText);

            // Update UI
            addRowToTable(cleanText, timestamp);
            notify("✅ Added: " + cleanText, "success");
            
            if (!isScanned) {
                rollInput.value = '';
                rollInput.focus();
            } else {
                rollInput.value = cleanText;
            }
        }

        // --- Event Listeners ---
        saveBtn.addEventListener('click', () => handleRollNumber(rollInput.value));
        
        rollInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleRollNumber(rollInput.value);
        });

        exportBtn.addEventListener('click', () => {
            const data = getStoredData();
            if (data.length === 0) {
                notify("No data to export", "warning");
                return;
            }
            const csvContent = "Roll Number,Date,Time\n" + 
                data.map(r => `${r.roll},${r.date},${new Date(r.timestamp).toLocaleTimeString()}`).join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // Background Keyboard Scanner
        let kbBuffer = '';
        let kbTimer;
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'Enter') {
                if (kbBuffer.length > 3) handleRollNumber(kbBuffer, true);
                kbBuffer = '';
            } else {
                kbBuffer += e.key;
                clearTimeout(kbTimer);
                kbTimer = setTimeout(() => kbBuffer = '', 200);
            }
        });

        // --- Initialization ---
        function loadTodayData() {
            const today = new Date().toISOString().split('T')[0];
            const data = getStoredData();
            todayAttendance.clear();
            tableBody.innerHTML = ''; // Clear table before loading

            // Filter for today only
            const todaysRecords = data.filter(record => record.date === today);
            
            todaysRecords.forEach(record => {
                todayAttendance.add(record.roll);
                addRowToTable(record.roll, record.timestamp);
            });
        }

        loadTodayData();
        rollInput.focus();
    </script>
</body>
