<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSS Attendance</title>
    <style>
        :root {
            --primary: #667eea;
            --bg: #f4f6f8;
            --text: #2d3748;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Minimal Input Styling */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #718096; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: border 0.2s;
            background: #fcfcfc;
        }
        input[type="text"] {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input:focus { outline: none; border-color: var(--primary); background: white; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #718096; }
        .btn-outline:hover { border-color: #cbd5e0; color: #4a5568; }

        /* Scanner */
        #scanner-container {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            display: none; /* Hidden by default */
            background: #000;
        }
        #scanner-container.active { display: block; }
        #reader {
            width: 100%;
        }

        /* Alerts */
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        .alert.success { background: #c6f6d5; color: #22543d; display: block; }
        .alert.error { background: #fed7d7; color: #822727; display: block; }
        .alert.warning { background: #feebc8; color: #744210; display: block; }

        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>NSS Attendance</h1>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <div id="scanner-container">
                <div id="reader"></div>
            </div>

            <button id="scanBtn" class="btn btn-outline" style="margin-bottom: 20px;">📷 Open Camera</button>
            <button id="stopScanBtn" class="btn btn-outline" style="margin-bottom: 20px; display: none;">🛑 Stop Camera</button>

            <div class="input-group">
                <label>Student Roll Number</label>
                <input type="text" id="rollInput" placeholder="Type roll number here..." autocomplete="off">
                <small style="color: #718096; font-size: 0.8rem; margin-top: 5px; display: block;">Type roll number and press Enter, or use connected barcode scanner</small>
            </div>

            <button id="saveBtn" class="btn btn-primary" style="margin-bottom: 15px;">Save Roll Number</button>
            <button id="exportBtn" class="btn btn-primary">Export CSV</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        // --- 1. Variable Declarations ---
        const STORAGE_KEY = 'nss_attendance';
        const rollInput = document.getElementById('rollInput');
        const saveBtn = document.getElementById('saveBtn');
        const exportBtn = document.getElementById('exportBtn');
        const scanBtn = document.getElementById('scanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const alertBox = document.getElementById('alertBox');
        const scannerContainer = document.getElementById('scanner-container');

        let html5QrCode = null; // Scanner instance
        let todayAttendance = new Set(); // Duplication check

        // --- 2. Notification Helper ---
        function notify(msg, type = 'success') {
            alertBox.textContent = msg;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
        }

        // --- 3. Scanner Logic ---
        scanBtn.addEventListener('click', async () => {
            // Check if library loaded
            if (typeof Html5Qrcode === "undefined") {
                notify("Scanner library failed to load. Check internet connection.", "error");
                return;
            }

            try {
                // Initialize scanner if not already created
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }

                // UI Changes
                scannerContainer.classList.add('active');
                scanBtn.style.display = 'none';
                stopScanBtn.style.display = 'block';
                
                notify("Starting camera...", "warning");

                // Start Scanning
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        // Success Callback
                        handleRollNumber(decodedText, true);
                        notify("Scanned!", "success");
                        // Optional: Stop after 1 scan? Uncomment next line if yes
                        // stopScanner(); 
                    },
                    (errorMessage) => {
                        // Error Callback (Scanning... nothing found yet)
                        // console.log(errorMessage); 
                    }
                );
                
                notify("Camera ready! Point at QR code", "success");

            } catch (err) {
                console.error("Start failed", err);
                notify("Camera error: " + err, "error");
                stopScanner();
            }
        });

        stopScanBtn.addEventListener('click', stopScanner);

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    scannerContainer.classList.remove('active');
                    scanBtn.style.display = 'block';
                    stopScanBtn.style.display = 'none';
                    html5QrCode.clear();
                }).catch(err => {
                    console.error("Stop failed", err);
                });
            } else {
                scannerContainer.classList.remove('active');
                scanBtn.style.display = 'block';
                stopScanBtn.style.display = 'none';
            }
        }

        // --- 4. Data Handling ---
        function getStoredData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveToStorage(record) {
            const data = getStoredData();
            data.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function handleRollNumber(text, isScanned = false) {
            const cleanText = text.trim().toUpperCase().replace(/[^A-Z0-9.]/g, '');
            
            if (!cleanText) {
                if(!isScanned) notify("Enter a roll number", "error"); 
                return; 
            }

            if (!isScanned) {
                rollInput.value = cleanText;
            }

            // Check Duplicate
            if (todayAttendance.has(cleanText)) {
                notify("⚠️ " + cleanText + " already marked!", "warning");
                if(!isScanned) rollInput.value = '';
                return;
            }

            // Save Data
            const record = { 
                roll: cleanText, 
                date: new Date().toISOString().split('T')[0], 
                timestamp: Date.now() 
            };
            
            saveToStorage(record);
            todayAttendance.add(cleanText);

            notify("✅ Saved: " + cleanText, "success");
            
            // If manual entry, clear box. If scanner, keep camera open (or close if you prefer)
            if (!isScanned) {
                rollInput.value = '';
                rollInput.focus();
            } else {
                // Update input box to show what was just scanned
                rollInput.value = cleanText;
            }
        }

        // --- 5. Event Listeners ---
        
        // Manual Save Button
        saveBtn.addEventListener('click', () => {
            handleRollNumber(rollInput.value);
        });

        // Enter Key in Input Box
        rollInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleRollNumber(rollInput.value);
            }
        });

        // Export CSV
        exportBtn.addEventListener('click', () => {
            const data = getStoredData();
            if (data.length === 0) {
                notify("No data to export", "warning");
                return;
            }
            const csvContent = "Roll Number,Date,Timestamp\n" + 
                data.map(r => `${r.roll},${r.date},${new Date(r.timestamp).toLocaleString()}`).join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            notify("CSV downloaded!", "success");
        });

        // Background Keyboard Scanner Listener (for USB scanners)
        let kbBuffer = '';
        let kbTimer;
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; // Ignore typing in box
            
            if (e.key === 'Enter') {
                if (kbBuffer.length > 3) handleRollNumber(kbBuffer, true);
                kbBuffer = '';
            } else {
                kbBuffer += e.key;
                clearTimeout(kbTimer);
                kbTimer = setTimeout(() => kbBuffer = '', 200);
            }
        });

        // --- 6. Initialization ---
        function loadTodayData() {
            const today = new Date().toISOString().split('T')[0];
            const data = getStoredData();
            todayAttendance.clear();
            data.forEach(record => {
                if (record.date === today) {
                    todayAttendance.add(record.roll);
                }
            });
        }

        loadTodayData();
        rollInput.focus();

        // Check for HTTPS
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            notify("⚠️ Camera requires HTTPS!", "warning");
        }
    </script>
</body>
</html>
